<title>LSMWEAR Sales</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#fff;color:#000;
  min-height:100vh;font-size:14px;
  overscroll-behavior:none;
}

/* HEADER */
header{
  background:#fff;
  border-bottom:2px solid #000;
  padding-top:calc(18px + env(safe-area-inset-top));
  position:sticky;top:0;z-index:100;
}
.logo-wrap{
  display:flex;justify-content:center;align-items:center;
  padding:0 20px 16px;
  border-bottom:1px solid #ebebeb;
}
.logo-img{width:200px;object-fit:contain;display:block;}

.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:1;min-width:72px;
  background:#fff;border:none;
  border-right:1px solid #ebebeb;
  color:#bbb;padding:13px 6px;
  font-family:inherit;font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.nav-btn:last-child{border-right:none;}
.nav-btn.active{background:#000;color:#fff;}

/* CONTAINER */
.container{
  padding:20px 16px;
  padding-bottom:calc(32px + env(safe-area-inset-bottom));
  max-width:500px;margin:0 auto;
}
.view{display:none;}
.view.active{display:block;}

/* STATS */
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;margin-bottom:20px;
  border:2px solid #000;border-radius:6px;overflow:hidden;
}
.stat-card{
  background:#fff;padding:18px 16px;
  border-right:1px solid #ebebeb;
  border-bottom:1px solid #ebebeb;
}
.stat-card:nth-child(2){border-right:none;}
.stat-card:nth-child(3){border-bottom:none;}
.stat-card:nth-child(4){border-right:none;border-bottom:none;}
.stat-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#aaa;margin-bottom:8px;font-weight:700;}
.stat-value{font-size:24px;font-weight:300;color:#000;line-height:1;letter-spacing:-0.02em;}
.stat-sub{font-size:11px;color:#ccc;margin-top:5px;}

/* SECTION */
.section-card{border:2px solid #000;border-radius:6px;overflow:hidden;margin-bottom:16px;background:#fff;}
.section-title-bar{
  padding:11px 16px;border-bottom:1px solid #ebebeb;
  font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
  color:#aaa;font-weight:700;background:#fafafa;
}

/* FORM */
.form-body{padding:16px;}
.form-group{margin-bottom:14px;}
label{
  display:block;font-size:9px;letter-spacing:0.12em;
  text-transform:uppercase;color:#aaa;margin-bottom:6px;font-weight:700;
}
label .opt{font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;}

input,select,textarea{
  width:100%;font-family:inherit;font-size:14px;
  background:#f7f7f7;border:1.5px solid #e0e0e0;
  border-radius:6px;padding:12px 14px;color:#000;
  outline:none;transition:border-color 0.15s;
  appearance:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:#000;background:#fff;}
textarea{resize:none;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ITEM BLOCK */
.item-block{
  background:#f7f7f7;border:1.5px solid #e0e0e0;
  border-radius:8px;padding:14px;margin-bottom:10px;position:relative;
}
.item-block .item-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.item-block .item-row:last-child{margin-bottom:0;}
.btn-remove-item{
  position:absolute;top:10px;right:10px;
  background:#fff;border:1.5px solid #e0e0e0;color:#aaa;
  width:26px;height:26px;border-radius:50%;font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.btn-remove-item:active{border-color:#000;color:#000;}
.btn-add-item{
  width:100%;background:#fff;border:1.5px dashed #ccc;color:#aaa;
  padding:12px;border-radius:6px;font-family:inherit;font-size:13px;
  font-weight:500;cursor:pointer;margin-bottom:14px;transition:all 0.15s;
}
.btn-add-item:active{border-color:#000;color:#000;}

/* BUTTONS */
.btn-primary{
  width:100%;background:#000;color:#fff;border:2px solid #000;
  padding:15px;border-radius:6px;font-family:inherit;font-size:12px;
  font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:opacity 0.15s;
}
.btn-primary:active{opacity:0.75;}
.btn-secondary{
  width:100%;background:#fff;border:2px solid #000;color:#000;
  padding:13px;border-radius:6px;font-family:inherit;font-size:12px;
  font-weight:600;letter-spacing:0.06em;cursor:pointer;transition:all 0.15s;
}
.btn-secondary:active{background:#000;color:#fff;}
.btn-danger{
  width:100%;background:#fff;border:2px solid #cc0000;color:#cc0000;
  padding:13px;border-radius:6px;font-family:inherit;font-size:12px;
  font-weight:600;cursor:pointer;
}
.btn-danger:active{background:#cc0000;color:#fff;}

.total-display{
  text-align:center;font-size:38px;font-weight:300;color:#000;
  padding:18px 0;letter-spacing:-0.02em;
  border-top:1px solid #ebebeb;border-bottom:1px solid #ebebeb;margin-bottom:16px;
}
.divider{height:1px;background:#ebebeb;margin:16px 0;}

/* HISTORY */
.sale-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-bottom:1px solid #ebebeb;
  cursor:pointer;transition:background 0.1s;gap:12px;
}
.sale-row:last-child{border-bottom:none;}
.sale-row:active{background:#f5f5f5;}
.sale-name{font-size:14px;font-weight:600;}
.sale-meta{font-size:11px;color:#aaa;margin-top:3px;}
.sale-amount{font-size:17px;font-weight:300;white-space:nowrap;}
.sale-date{font-size:11px;color:#ccc;text-align:right;margin-top:3px;}
.channel-pill{
  display:inline-block;font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;
  background:#000;color:#fff;margin-top:5px;
}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.bar-label{font-size:11px;color:#666;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.bar-track{flex:1;background:#f0f0f0;border-radius:2px;height:22px;overflow:hidden;}
.bar-fill{height:100%;background:#000;border-radius:2px;display:flex;align-items:center;padding-left:8px;min-width:4px;transition:width 0.5s ease;}
.bar-fill span{font-size:10px;color:#fff;font-weight:600;white-space:nowrap;}
.bar-count{font-size:11px;color:#aaa;width:50px;text-align:right;flex-shrink:0;}

/* FILTER */
.search-input{
  width:100%;background:#fff;border:2px solid #000;border-radius:6px;
  padding:12px 14px;color:#000;font-family:inherit;font-size:14px;
  outline:none;margin-bottom:12px;
}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{
  flex-shrink:0;background:#fff;border:1.5px solid #ddd;color:#666;
  padding:8px 14px;border-radius:20px;font-family:inherit;font-size:12px;
  font-weight:500;cursor:pointer;appearance:none;-webkit-appearance:none;
}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:#ccc;}
.empty-icon{font-size:36px;display:block;margin-bottom:12px;}
.empty-state p{font-size:13px;}

/* TOAST */
.toast{
  position:fixed;
  bottom:calc(24px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:#000;color:#fff;padding:12px 24px;border-radius:30px;
  font-size:13px;font-weight:600;letter-spacing:0.04em;
  opacity:0;transition:all 0.25s ease;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);z-index:500;align-items:flex-end;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff;border-radius:18px 18px 0 0;border-top:3px solid #000;
  width:100%;max-height:92vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom);
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;}
.modal-header{
  padding:16px 20px;border-bottom:1px solid #ebebeb;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:700;letter-spacing:0.02em;}
.modal-close{
  background:#f0f0f0;border:none;color:#666;
  width:30px;height:30px;border-radius:50%;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;
}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px 16px;border-top:1px solid #ebebeb;display:flex;flex-direction:column;gap:8px;}

/* CONFIRM */
.confirm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:600;
  align-items:center;justify-content:center;padding:20px;
}
.confirm-overlay.open{display:flex;}
.confirm-box{
  background:#fff;border:2px solid #000;border-radius:12px;
  padding:28px 24px;width:100%;max-width:320px;text-align:center;
  animation:scaleIn 0.18s ease;
}
@keyframes scaleIn{from{transform:scale(0.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.confirm-title{font-size:18px;font-weight:700;margin-bottom:10px;}
.confirm-msg{font-size:13px;color:#888;margin-bottom:24px;line-height:1.5;}
.confirm-actions{display:flex;flex-direction:column;gap:8px;}
</style>
</head>
<body>

<script>
let sales=JSON.parse(localStorage.getItem('lsmwear_sales')||'[]');
let pendingDeleteId=null;
const PRODUCTS=['BARE TOP','BARE Shorts','BARE SET','CORE CROPPED','CORE SET','Bare Legging'];
const COLOURS=['Black','Ivory','Light Pink','Butter'];
const SIZES=['4','6','8','10','12'];

document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
addFormItem();
document.getElementById('f-items-container').addEventListener('input',calcFormTotal);
updateDashboard();

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='analytics')renderAnalytics();
  if(name==='history'){populateMonthFilter();renderHistory();}
  if(name==='dashboard')updateDashboard();
}

function makeItemBlock(prefix,item){
  const div=document.createElement('div');
  div.className='item-block';
  div.innerHTML=`
    <button class="btn-remove-item" onclick="removeItem(this,'${prefix}')">&#10005;</button>
    <div class="item-row">
      <div class="form-group"><label>Product</label>
        <select class="${prefix}-product">
          <option value="">Select</option>
          ${PRODUCTS.map(p=>`<option value="${p}" ${item&&item.product===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Colour</label>
        <select class="${prefix}-colour">
          ${COLOURS.map(c=>`<option value="${c}" ${item&&item.colour===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="item-row">
      <div class="form-group"><label>Size</label>
        <select class="${prefix}-size">
          ${SIZES.map(s=>`<option value="${s}" ${item&&item.size===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Price (A$)</label>
        <input type="number" class="${prefix}-price" placeholder="0.00" step="0.01" min="0" value="${item?item.price:''}" oninput="${prefix==='f'?'calcFormTotal()':'calcModalTotal()'}"/>
      </div>
    </div>`;
  return div;
}

function addFormItem(item){document.getElementById('f-items-container').appendChild(makeItemBlock('f',item||null));calcFormTotal();}
function addModalItem(item){document.getElementById('m-items-container').appendChild(makeItemBlock('m',item||null));calcModalTotal();}

function removeItem(btn,prefix){
  const c=document.getElementById(prefix+'-items-container');
  if(c.children.length===1){showToast('At least one item required');return;}
  btn.closest('.item-block').remove();
  prefix==='f'?calcFormTotal():calcModalTotal();
}

function getItems(prefix){
  return[...document.querySelectorAll('#'+prefix+'-items-container .item-block')].map(b=>({
    product:b.querySelector('.'+prefix+'-product').value,
    colour:b.querySelector('.'+prefix+'-colour').value,
    size:b.querySelector('.'+prefix+'-size').value,
    price:parseFloat(b.querySelector('.'+prefix+'-price').value)||0
  }));
}

function calcTotal(prefix){
  const items=getItems(prefix);
  const sub=items.reduce((a,i)=>a+i.price,0);
  const s=parseFloat(document.getElementById(prefix+'-shipping').value)||0;
  const d=parseFloat(document.getElementById(prefix+'-discount').value)||0;
  return Math.max(0,sub+s-d);
}
function calcFormTotal(){document.getElementById('form-total').textContent='A$'+calcTotal('f').toFixed(2);}
function calcModalTotal(){document.getElementById('modal-total').textContent='A$'+calcTotal('m').toFixed(2);}

function saveSale(){
  const customer=document.getElementById('f-customer').value.trim();
  const channel=document.getElementById('f-channel').value;
  if(!customer){showToast('Enter customer name');return;}
  if(!channel){showToast('Select a channel');return;}
  const items=getItems('f');
  if(items.some(i=>!i.product)){showToast('Select product for all items');return;}
  const total=calcTotal('f');
  sales.push({
    id:Date.now(),
    date:document.getElementById('f-date').value,
    customer,
    mobile:document.getElementById('f-mobile').value.trim(),
    email:document.getElementById('f-email').value.trim(),
    instagram:document.getElementById('f-instagram').value.trim(),
    channel,
    payment:document.getElementById('f-payment').value,
    items,
    shipping:parseFloat(document.getElementById('f-shipping').value)||0,
    discount:parseFloat(document.getElementById('f-discount').value)||0,
    total,
    notes:document.getElementById('f-notes').value.trim()
  });
  saveSales();
  showToast('Saved — '+customer+' · A$'+total.toFixed(2));
  clearForm();
  updateDashboard();
}

function clearForm(){
  ['f-customer','f-mobile','f-email','f-instagram','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-channel').value='';
  document.getElementById('f-payment').value='';
  document.getElementById('f-shipping').value='0';
  document.getElementById('f-discount').value='0';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-items-container').innerHTML='';
  addFormItem();
}

function saveSales(){localStorage.setItem('lsmwear_sales',JSON.stringify(sales));}

function updateDashboard(){
  const total=sales.reduce((a,s)=>a+s.total,0);
  const now=new Date();
  const tm=sales.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const units=sales.reduce((a,s)=>a+s.items.length,0);
  document.getElementById('stat-revenue').textContent='A$'+Math.round(total).toLocaleString();
  document.getElementById('stat-revenue-sub').textContent=sales.length+' transactions';
  document.getElementById('stat-month').textContent='A$'+Math.round(tm.reduce((a,s)=>a+s.total,0)).toLocaleString();
  document.getElementById('stat-month-sub').textContent=tm.length+' sales';
  document.getElementById('stat-avg').textContent='A$'+(sales.length?total/sales.length:0).toFixed(0);
  document.getElementById('stat-units').textContent=units;
  const recent=[...sales].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const el=document.getElementById('dash-recent');
  if(!recent.length){el.innerHTML='<div class="empty-state"><span class="empty-icon">🛍</span><p>No sales yet</p></div>';return;}
  el.innerHTML=recent.map(s=>`<div class="sale-row" onclick="openModal(${s.id})"><div><div class="sale-name">${s.customer}</div><div class="sale-meta">${s.items.map(i=>i.product).join(', ')}</div></div><div style="text-align:right"><div class="sale-amount">A$${s.total.toFixed(2)}</div><div class="sale-date">${formatDate(s.date)}</div></div></div>`).join('');
  const cData={};sales.forEach(s=>{cData[s.channel]=(cData[s.channel]||0)+s.total;});
  renderBar('dash-channel-chart',cData,'A$');
}

function populateMonthFilter(){
  const months=[...new Set(sales.map(s=>s.date.slice(0,7)))].sort().reverse();
  const sel=document.getElementById('h-month');const cur=sel.value;
  sel.innerHTML='<option value="">All months</option>'+months.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${formatMonth(m)}</option>`).join('');
}

function renderHistory(){
  const search=(document.getElementById('h-search').value||'').toLowerCase();
  const channel=document.getElementById('h-channel').value;
  const month=document.getElementById('h-month').value;
  const f=sales.filter(s=>(!search||s.customer.toLowerCase().includes(search)||s.items.some(i=>i.product.toLowerCase().includes(search)))&&(!channel||s.channel===channel)&&(!month||s.date.startsWith(month))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('history-list');
  if(!f.length){el.innerHTML='<div class="empty-state"><span class="empty-icon">📋</span><p>No sales found</p></div>';return;}
  el.innerHTML=f.map(s=>`<div class="sale-row" onclick="openModal(${s.id})"><div><div class="sale-name">${s.customer}</div><div class="sale-meta">${s.items.map(i=>i.product+' sz'+i.size).join(' · ')}${s.mobile?' · '+s.mobile:''}</div><span class="channel-pill">${s.channel}</span></div><div style="text-align:right"><div class="sale-amount">A$${s.total.toFixed(2)}</div><div class="sale-date">${formatDate(s.date)}</div></div></div>`).join('');
}

function renderAnalytics(){
  const pData={};sales.forEach(s=>s.items.forEach(i=>{pData[i.product]=(pData[i.product]||0)+i.price;}));
  renderBar('a-product-chart',pData,'A$');
  const cData={};sales.forEach(s=>{cData[s.channel]=(cData[s.channel]||0)+s.total;});
  renderBar('a-channel-chart',cData,'A$');
  const custData={};sales.forEach(s=>{custData[s.customer]=(custData[s.customer]||0)+s.total;});
  const top=Object.entries(custData).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const tcEl=document.getElementById('a-top-customers');
  tcEl.innerHTML=top.length?top.map(([n,v])=>`<div class="sale-row"><div class="sale-name">${n}</div><div class="sale-amount">A$${v.toFixed(2)}</div></div>`).join(''):'<div class="empty-state" style="padding:24px"><p>No data yet</p></div>';
  const sData={};sales.forEach(s=>s.items.forEach(i=>{const k='Size '+i.size;sData[k]=(sData[k]||0)+1;}));
  renderBar('a-size-chart',sData,'',true);
}

function renderBar(elId,data,prefix,isCount){
  const el=document.getElementById(elId);if(!el)return;
  const entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){el.innerHTML='<div class="empty-state" style="padding:16px"><p>No data yet</p></div>';return;}
  const max=Math.max(...entries.map(e=>e[1]));
  el.innerHTML=entries.map(([key,val])=>{
    const pct=Math.round((val/max)*100);
    const display=isCount?val+' units':prefix+val.toFixed(0);
    return`<div class="bar-row"><div class="bar-label" title="${key}">${key}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%">${pct>25?`<span>${display}</span>`:''}</div></div><div class="bar-count">${pct<=25?display:''}</div></div>`;
  }).join('');
}

function openModal(id){
  const s=sales.find(x=>x.id===id);if(!s)return;
  document.getElementById('m-id').value=id;
  document.getElementById('m-customer').value=s.customer;
  document.getElementById('m-mobile').value=s.mobile||'';
  document.getElementById('m-email').value=s.email||'';
  document.getElementById('m-instagram').value=s.instagram||'';
  document.getElementById('m-date').value=s.date;
  document.getElementById('m-channel').value=s.channel;
  document.getElementById('m-payment').value=s.payment||'';
  document.getElementById('m-shipping').value=s.shipping||0;
  document.getElementById('m-discount').value=s.discount||0;
  document.getElementById('m-notes').value=s.notes||'';
  document.getElementById('m-items-container').innerHTML='';
  s.items.forEach(item=>addModalItem(item));
  calcModalTotal();
  document.getElementById('edit-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('edit-overlay').classList.remove('open');document.body.style.overflow='';}
function handleModalOverlay(e){if(e.target===document.getElementById('edit-overlay'))closeModal();}

function saveEdit(){
  const id=parseInt(document.getElementById('m-id').value);
  const customer=document.getElementById('m-customer').value.trim();
  if(!customer){showToast('Customer name required');return;}
  const items=getItems('m');
  if(items.some(i=>!i.product)){showToast('Select product for all items');return;}
  const total=calcTotal('m');
  const idx=sales.findIndex(s=>s.id===id);if(idx===-1)return;
  sales[idx]={...sales[idx],customer,
    mobile:document.getElementById('m-mobile').value.trim(),
    email:document.getElementById('m-email').value.trim(),
    instagram:document.getElementById('m-instagram').value.trim(),
    date:document.getElementById('m-date').value,
    channel:document.getElementById('m-channel').value,
    payment:document.getElementById('m-payment').value,
    items,
    shipping:parseFloat(document.getElementById('m-shipping').value)||0,
    discount:parseFloat(document.getElementById('m-discount').value)||0,
    total,
    notes:document.getElementById('m-notes').value.trim()
  };
  saveSales();closeModal();updateDashboard();renderHistory();showToast('Updated — '+customer);
}

function deleteFromModal(){const id=parseInt(document.getElementById('m-id').value);const customer=document.getElementById('m-customer').value;closeModal();promptDelete(id,customer);}
function promptDelete(id,customer){pendingDeleteId=id;document.getElementById('confirm-msg').textContent='Delete sale for "'+customer+'"? Cannot be undone.';document.getElementById('confirm-overlay').classList.add('open');}
function closeConfirm(){pendingDeleteId=null;document.getElementById('confirm-overlay').classList.remove('open');}
function confirmDelete(){if(!pendingDeleteId)return;sales=sales.filter(s=>s.id!==pendingDeleteId);saveSales();closeConfirm();updateDashboard();renderHistory();showToast('Sale deleted');pendingDeleteId=null;}

function exportCSV(){
  if(!sales.length){showToast('No sales to export');return;}
  const rows=[['Date','Customer','Mobile','Email','Instagram','Channel','Payment','Products','Colours','Sizes','Total','Notes']];
  sales.forEach(s=>rows.push([s.date,s.customer,s.mobile||'',s.email||'',s.instagram||'',s.channel,s.payment||'',s.items.map(i=>i.product).join('|'),s.items.map(i=>i.colour).join('|'),s.items.map(i=>i.size).join('|'),s.total.toFixed(2),s.notes||'']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='lsmwear-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();showToast('CSV exported!');
}

function formatDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function formatMonth(m){return new Date(m+'-01').toLocaleString('en-AU',{month:'long',year:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
</script>
